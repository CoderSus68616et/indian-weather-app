<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indian Weather 3D App</title>

    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React and ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Babel for translating JSX in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Three.js for 3D Background -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1c2331;
        }

        @keyframes fade-in-down {
            0% {
                opacity: 0;
                transform: translateY(-20px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fade-in {
            0% {
                opacity: 0;
            }

            100% {
                opacity: 1;
            }
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-5px);
            }

            75% {
                transform: translateX(5px);
            }
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .animate-fade-in-down {
            animation: fade-in-down 0.8s ease-out;
        }

        .animate-fade-in {
            animation: fade-in 0.3s ease-out;
        }

        .animate-shake {
            animation: shake 0.4s ease-in-out;
        }

        .animate-spin {
            animation: spin 1s linear infinite;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Custom Inline SVGs to replace Lucide React imports for the standalone file
        const Search = ({ size = 24, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="11" cy="11" r="8" /><line x1="21" y1="21" x2="16.65" y2="16.65" /></svg>;
        const Droplets = ({ size = 24, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z" /></svg>;
        const Wind = ({ size = 24, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M17.7 7.7a2.5 2.5 0 1 1 1.8 4.3H2M9.6 4.6A2 2 0 1 1 11 8H2M12.6 19.4A2 2 0 1 0 14 16H2" /></svg>;
        const Thermometer = ({ size = 24, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z" /></svg>;
        const MapPin = ({ size = 24, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" /><circle cx="12" cy="10" r="3" /></svg>;
        const Loader2 = ({ size = 24, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 12a9 9 0 1 1-6.219-8.56" /></svg>;
        const AlertCircle = ({ size = 24, className = "" }) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10" /><line x1="12" y1="8" x2="12" y2="12" /><line x1="12" y1="16" x2="12.01" y2="16" /></svg>;

        // Exactly 70 Major Indian Cities
        const INDIAN_CITIES = [
            "Mumbai", "Delhi", "Bengaluru", "Hyderabad", "Ahmedabad", "Chennai", "Kolkata", "Surat", "Pune", "Jaipur",
            "Lucknow", "Kanpur", "Nagpur", "Indore", "Thane", "Bhopal", "Visakhapatnam", "Pimpri-Chinchwad", "Patna", "Vadodara",
            "Ghaziabad", "Ludhiana", "Agra", "Nashik", "Faridabad", "Meerut", "Rajkot", "Kalyan-Dombivli", "Vasai-Virar", "Varanasi",
            "Srinagar", "Aurangabad", "Dhanbad", "Amritsar", "Navi Mumbai", "Allahabad", "Howrah", "Ranchi", "Gwalior", "Jabalpur",
            "Coimbatore", "Vijayawada", "Jodhpur", "Madurai", "Raipur", "Kota", "Guwahati", "Chandigarh", "Solapur", "Hubballi-Dharwad",
            "Bareilly", "Moradabad", "Mysore", "Gurugram", "Aligarh", "Jalandhar", "Tiruchirappalli", "Bhubaneswar", "Salem", "Mira-Bhayandar",
            "Warangal", "Thiruvananthapuram", "Bhiwandi", "Saharanpur", "Guntur", "Amravati", "Bikaner", "Noida", "Jamshedpur", "Bhilai"
        ];

        const getWeatherCondition = (code) => {
            if (code === 0) return 'clear';
            if (code >= 1 && code <= 3) return 'cloudy';
            if (code >= 45 && code <= 48) return 'cloudy';
            if (code >= 51 && code <= 67) return 'rain';
            if (code >= 71 && code <= 77) return 'snow';
            if (code >= 80 && code <= 82) return 'rain';
            if (code >= 95 && code <= 99) return 'storm';
            return 'clear';
        };

        const getWeatherDescription = (code) => {
            if (code === 0) return 'Clear Sky';
            if (code === 1) return 'Mainly Clear';
            if (code === 2) return 'Partly Cloudy';
            if (code === 3) return 'Overcast';
            if (code >= 45 && code <= 48) return 'Foggy';
            if (code >= 51 && code <= 67) return 'Rainy';
            if (code >= 71 && code <= 77) return 'Snowy';
            if (code >= 80 && code <= 82) return 'Rain Showers';
            if (code >= 95 && code <= 99) return 'Thunderstorm';
            return 'Clear';
        };

        function App() {
            const [query, setQuery] = useState('');
            const [suggestions, setSuggestions] = useState([]);
            const [selectedCity, setSelectedCity] = useState(null);
            const [weatherData, setWeatherData] = useState(null);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');

            const canvasRef = useRef(null);
            const threeStateRef = useRef({ scene: null, camera: null, renderer: null, activeObjects: [], animationId: null });

            const handleSearch = (e) => {
                const val = e.target.value;
                setQuery(val);
                if (val.length > 0) {
                    const filtered = INDIAN_CITIES.filter(city => city.toLowerCase().includes(val.toLowerCase()));
                    setSuggestions(filtered);
                } else {
                    setSuggestions([]);
                }
            };

            const fetchWeather = async (cityName) => {
                setLoading(true);
                setError('');
                setSuggestions([]);
                setSelectedCity(cityName);
                setQuery(cityName);

                try {
                    const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${cityName}&count=1&language=en&format=json`);
                    const geoData = await geoRes.json();

                    if (!geoData.results || geoData.results.length === 0) {
                        throw new Error("City not found in API database.");
                    }

                    const { latitude, longitude, name, admin1 } = geoData.results[0];

                    const weatherRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current=temperature_2m,relative_humidity_2m,apparent_temperature,is_day,precipitation,weather_code,wind_speed_10m&timezone=Asia%2FKolkata`);
                    const weatherData = await weatherRes.json();

                    setWeatherData({
                        city: name,
                        state: admin1 || 'India',
                        temp: weatherData.current.temperature_2m,
                        feelsLike: weatherData.current.apparent_temperature,
                        humidity: weatherData.current.relative_humidity_2m,
                        windSpeed: weatherData.current.wind_speed_10m,
                        conditionCode: weatherData.current.weather_code,
                        isDay: weatherData.current.is_day === 1,
                        condition: getWeatherCondition(weatherData.current.weather_code),
                        description: getWeatherDescription(weatherData.current.weather_code)
                    });
                } catch (err) {
                    setError(err.message || "Failed to fetch weather data.");
                    setWeatherData(null);
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => {
                initThreeJS();
                return () => {
                    if (threeStateRef.current.animationId) {
                        cancelAnimationFrame(threeStateRef.current.animationId);
                    }
                    if (threeStateRef.current.renderer) {
                        threeStateRef.current.renderer.dispose();
                    }
                };
            }, []);

            useEffect(() => {
                if (window.THREE && threeStateRef.current.scene && weatherData) {
                    updateThreeScene(weatherData.condition, weatherData.isDay);
                }
            }, [weatherData]);

            const initThreeJS = () => {
                if (!canvasRef.current || !window.THREE) return;

                const THREE = window.THREE;
                const scene = new THREE.Scene();

                const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                camera.position.z = 30;

                const renderer = new THREE.WebGLRenderer({ canvas: canvasRef.current, alpha: true, antialias: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(window.devicePixelRatio);

                const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
                scene.add(ambientLight);
                const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
                directionalLight.position.set(10, 20, 10);
                scene.add(directionalLight);

                threeStateRef.current = { scene, camera, renderer, activeObjects: [], animationId: null };

                window.addEventListener('resize', onWindowResize);

                updateThreeScene('clear', true);
                animate();
            };

            const onWindowResize = () => {
                const state = threeStateRef.current;
                if (state.camera && state.renderer) {
                    state.camera.aspect = window.innerWidth / window.innerHeight;
                    state.camera.updateProjectionMatrix();
                    state.renderer.setSize(window.innerWidth, window.innerHeight);
                }
            };

            const clearScene = () => {
                const { scene, activeObjects } = threeStateRef.current;
                activeObjects.forEach(obj => {
                    scene.remove(obj);
                    if (obj.geometry) obj.geometry.dispose();
                    if (obj.material) {
                        if (Array.isArray(obj.material)) obj.material.forEach(m => m.dispose());
                        else obj.material.dispose();
                    }
                });
                threeStateRef.current.activeObjects = [];
            };

            const updateThreeScene = (condition, isDay) => {
                const THREE = window.THREE;
                const { scene } = threeStateRef.current;
                clearScene();

                const objects = [];

                if (condition === 'clear') {
                    const geometry = new THREE.IcosahedronGeometry(10, 1);
                    const material = new THREE.MeshStandardMaterial({
                        color: isDay ? 0xffdd00 : 0x8888ff,
                        wireframe: true,
                        emissive: isDay ? 0xffaa00 : 0x222255,
                        emissiveIntensity: 0.5
                    });
                    const sun = new THREE.Mesh(geometry, material);
                    sun.position.set(15, 10, -10);
                    scene.add(sun);
                    objects.push(sun);

                    const particlesGeo = new THREE.BufferGeometry();
                    const particlesCount = 200;
                    const posArray = new Float32Array(particlesCount * 3);
                    for (let i = 0; i < particlesCount * 3; i++) {
                        posArray[i] = (Math.random() - 0.5) * 100;
                    }
                    particlesGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
                    const particlesMat = new THREE.PointsMaterial({ size: 0.2, color: isDay ? 0xffddaa : 0xffffff });
                    const particles = new THREE.Points(particlesGeo, particlesMat);
                    scene.add(particles);
                    objects.push(particles);

                } else if (condition === 'cloudy') {
                    for (let i = 0; i < 5; i++) {
                        const cloudGroup = new THREE.Group();
                        const cloudMat = new THREE.MeshStandardMaterial({ color: 0xdddddd, flatShading: true });

                        const geometries = [
                            new THREE.SphereGeometry(4, 16, 16),
                            new THREE.SphereGeometry(3, 16, 16),
                            new THREE.SphereGeometry(3.5, 16, 16)
                        ];

                        geometries.forEach((geo, index) => {
                            const mesh = new THREE.Mesh(geo, cloudMat);
                            mesh.position.x = index * 3 - 3;
                            mesh.position.y = Math.random() * 2 - 1;
                            cloudGroup.add(mesh);
                        });

                        cloudGroup.position.set((Math.random() - 0.5) * 60, (Math.random() - 0.5) * 30 + 10, -10 - Math.random() * 20);
                        scene.add(cloudGroup);
                        objects.push(cloudGroup);
                    }
                } else if (condition === 'rain' || condition === 'storm') {
                    const rainCount = 1500;
                    const rainGeo = new THREE.BufferGeometry();
                    const rainArray = new Float32Array(rainCount * 3);
                    for (let i = 0; i < rainCount * 3; i += 3) {
                        rainArray[i] = (Math.random() - 0.5) * 100;
                        rainArray[i + 1] = Math.random() * 100 - 50;
                        rainArray[i + 2] = (Math.random() - 0.5) * 50 - 10;
                    }
                    rainGeo.setAttribute('position', new THREE.BufferAttribute(rainArray, 3));
                    const rainMat = new THREE.PointsMaterial({ color: 0xaaaaff, size: 0.3, transparent: true, opacity: 0.8 });
                    const rain = new THREE.Points(rainGeo, rainMat);
                    rain.userData = { isRain: true };
                    scene.add(rain);
                    objects.push(rain);

                    if (condition === 'storm') {
                        const cloudGroup = new THREE.Group();
                        const cloudMat = new THREE.MeshStandardMaterial({ color: 0x444444, flatShading: true });
                        const geo = new THREE.SphereGeometry(8, 16, 16);
                        const mesh = new THREE.Mesh(geo, cloudMat);
                        cloudGroup.add(mesh);
                        cloudGroup.position.set(0, 15, -10);
                        scene.add(cloudGroup);
                        objects.push(cloudGroup);
                    }
                }

                threeStateRef.current.activeObjects = objects;
            };

            const animate = () => {
                const state = threeStateRef.current;
                if (!state.scene || !state.camera || !state.renderer) return;

                state.activeObjects.forEach((obj, index) => {
                    if (obj.geometry && obj.geometry.type === 'IcosahedronGeometry') {
                        obj.rotation.x += 0.005;
                        obj.rotation.y += 0.005;
                    }
                    if (obj.type === 'Group') {
                        obj.position.x += 0.02 * (index % 2 === 0 ? 1 : -1);
                        if (obj.position.x > 40) obj.position.x = -40;
                        if (obj.position.x < -40) obj.position.x = 40;
                    }
                    if (obj.userData && obj.userData.isRain) {
                        const positions = obj.geometry.attributes.position.array;
                        for (let i = 1; i < positions.length; i += 3) {
                            positions[i] -= 0.8;
                            if (positions[i] < -50) {
                                positions[i] = 50;
                            }
                        }
                        obj.geometry.attributes.position.needsUpdate = true;
                    }
                    if (obj.type === 'Points' && !obj.userData.isRain) {
                        obj.rotation.y += 0.002;
                    }
                });

                state.renderer.render(state.scene, state.camera);
                state.animationId = requestAnimationFrame(animate);
            };

            const getAppBackground = () => {
                if (!weatherData) return 'bg-[#1c2331]';
                if (!weatherData.isDay) return 'bg-[#0f172a]';
                if (weatherData.condition === 'clear') return 'bg-gradient-to-br from-[#1c2331] to-[#2b4c7e]';
                if (weatherData.condition === 'rain' || weatherData.condition === 'storm') return 'bg-gradient-to-br from-[#1e293b] to-[#0f172a]';
                return 'bg-[#1c2331]';
            };

            return (
                <div className={`min-h-screen relative overflow-hidden transition-colors duration-1000 ${getAppBackground()} font-sans text-white`}>
                    <canvas ref={canvasRef} className="absolute inset-0 z-0 pointer-events-none opacity-80" />

                    <div className="relative z-10 flex flex-col items-center justify-center min-h-screen p-4 sm:p-8">
                        <div className="w-full max-w-xl mx-auto">

                            <div className="text-center mb-10 animate-fade-in-down">
                                <h1 className="text-4xl md:text-5xl font-bold mb-2 tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-[#4fa0b5] to-teal-200">
                                    Indian Weather 3D
                                </h1>
                                <p className="text-slate-400 text-sm md:text-base">Real-time forecasts with immersive 3D simulations</p>
                            </div>

                            <div className="relative w-full mb-8 z-50">
                                <div className="relative flex items-center group">
                                    <div className="absolute left-4 text-slate-400 group-focus-within:text-[#4fa0b5] transition-colors">
                                        <Search size={20} />
                                    </div>
                                    <input
                                        type="text"
                                        value={query}
                                        onChange={handleSearch}
                                        placeholder="Search any of the 70 major Indian cities..."
                                        className="w-full bg-slate-800/80 backdrop-blur-md border border-slate-700 text-white rounded-2xl py-4 pl-12 pr-4 outline-none focus:ring-2 focus:ring-[#4fa0b5] focus:border-transparent shadow-xl transition-all"
                                    />
                                </div>

                                {suggestions.length > 0 && (
                                    <ul className="absolute top-full left-0 right-0 mt-2 bg-slate-800/95 backdrop-blur-xl border border-slate-700 rounded-xl shadow-2xl max-h-60 overflow-y-auto z-50 animate-fade-in">
                                        {suggestions.map((city, i) => (
                                            <li
                                                key={i}
                                                onClick={() => fetchWeather(city)}
                                                className="px-5 py-3 hover:bg-[#4fa0b5]/20 cursor-pointer flex items-center gap-3 transition-colors border-b border-slate-700/50 last:border-0"
                                            >
                                                <MapPin size={16} className="text-[#4fa0b5]" />
                                                {city}
                                            </li>
                                        ))}
                                    </ul>
                                )}
                            </div>

                            {!weatherData && !loading && !error && (
                                <div className="bg-slate-800/40 border border-slate-700/50 rounded-2xl p-8 text-center backdrop-blur-sm animate-fade-in">
                                    <p className="text-slate-300 mb-4">
                                        Select a city from the list to view its perfect weather details, humidity, and an immersive 3D simulation of the current conditions.
                                    </p>
                                    <div className="flex flex-wrap justify-center gap-2 mt-6">
                                        {["Mumbai", "Delhi", "Bengaluru"].map(city => (
                                            <button
                                                key={city}
                                                onClick={() => fetchWeather(city)}
                                                className="px-4 py-2 bg-slate-700/50 hover:bg-[#4fa0b5] rounded-full text-sm transition-all shadow-md"
                                            >
                                                {city}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {loading && (
                                <div className="flex flex-col items-center justify-center p-12 bg-slate-800/30 backdrop-blur-md rounded-3xl border border-slate-700/50">
                                    <div className="animate-spin text-[#4fa0b5] mb-4">
                                        <Loader2 size={40} />
                                    </div>
                                    <p className="text-slate-300 font-medium animate-pulse">Fetching atmospheric data...</p>
                                </div>
                            )}

                            {error && (
                                <div className="flex flex-col items-center justify-center p-8 bg-red-900/20 backdrop-blur-md rounded-3xl border border-red-500/30 text-red-200 animate-shake">
                                    <AlertCircle size={40} className="mb-3 text-red-400" />
                                    <p>{error}</p>
                                </div>
                            )}

                            {weatherData && !loading && (
                                <div className="bg-slate-800/40 backdrop-blur-xl border border-slate-600/30 rounded-[2rem] p-8 sm:p-10 shadow-2xl transform transition-all hover:scale-[1.02] duration-300">

                                    <div className="flex justify-between items-start mb-8">
                                        <div>
                                            <h2 className="text-3xl font-bold text-white flex items-center gap-2">
                                                {weatherData.city}
                                            </h2>
                                            <p className="text-[#4fa0b5] text-lg font-medium">{weatherData.state}</p>
                                        </div>
                                        <div className="bg-slate-900/50 px-4 py-2 rounded-xl border border-slate-700">
                                            <span className="text-sm font-medium tracking-wider uppercase">{weatherData.description}</span>
                                        </div>
                                    </div>

                                    <div className="flex items-center justify-center my-8">
                                        <span className="text-7xl sm:text-9xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-b from-white to-slate-400 drop-shadow-lg">
                                            {Math.round(weatherData.temp)}°
                                        </span>
                                    </div>

                                    <div className="grid grid-cols-2 sm:grid-cols-3 gap-4 mt-10">
                                        <div className="bg-slate-900/40 p-4 rounded-2xl flex flex-col items-center justify-center gap-2 border border-slate-700/50">
                                            <Thermometer size={24} className="text-[#4fa0b5]" />
                                            <span className="text-slate-400 text-xs uppercase font-bold tracking-wider">Feels Like</span>
                                            <span className="text-xl font-bold">{Math.round(weatherData.feelsLike)}°C</span>
                                        </div>

                                        <div className="bg-slate-900/40 p-4 rounded-2xl flex flex-col items-center justify-center gap-2 border border-slate-700/50">
                                            <Droplets size={24} className="text-[#4fa0b5]" />
                                            <span className="text-slate-400 text-xs uppercase font-bold tracking-wider">Humidity</span>
                                            <span className="text-xl font-bold">{weatherData.humidity}%</span>
                                        </div>

                                        <div className="bg-slate-900/40 p-4 rounded-2xl flex flex-col items-center justify-center gap-2 border border-slate-700/50 sm:col-span-1 col-span-2">
                                            <Wind size={24} className="text-[#4fa0b5]" />
                                            <span className="text-slate-400 text-xs uppercase font-bold tracking-wider">Wind Speed</span>
                                            <span className="text-xl font-bold">{weatherData.windSpeed} km/h</span>
                                        </div>
                                    </div>

                                </div>
                            )}

                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
